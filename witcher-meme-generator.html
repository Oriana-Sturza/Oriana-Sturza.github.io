  <style>

      color: #f5f2eb;

    #copy-all-btn {

      color: #d4af37;
      font-size: 0.85rem;
      padding: 8px 16px;
    }

    #results {
      max-width: 820px;

      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #13131a;
      border: 1px solid #2a2820;
      border-left: 4px solid #d4af37;

      padding: 22px 24px;
      position: relative;
      transition: border-color 0.2s;
    }
    .card:hover { border-left-color: #f0d264; }

    .card-number {
      font-size: 0.75rem;
      color: #d4af37;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-type {
      display: inline-block;
      font-size: 0.7rem;
      background: #1e1c10;
      color: #d4af37;
      border: 1px solid #d4af37;
      border-radius: 3px;
      padding: 2px 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .card h3 {
      font-size: 1.15rem;
      color: #f5f2eb;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .card-caption {
      font-size: 0.92rem;
      color: #a09890;
      line-height: 1.6;
      border-top: 1px solid #2a2820;
      padding-top: 12px;
      margin-top: 4px;
      white-space: pre-wrap;
    }
    .card-caption strong { color: #d4f0b0; font-weight: normal; }

    .copy-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: 1px solid #3a3820;
      color: #7a7060;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0;
      text-transform: none;

    }
    .copy-btn:hover { border-color: #d4af37; color: #d4af37; background: transparent; }

    #placeholder {
      text-align: center;
      color: #3a3530;
      padding: 60px 20px;
      font-size: 1.1rem;
    }

    footer {

      margin-top: 60px;
      color: #3a3530;
      font-size: 0.8rem;
      letter-spacing: 1px;

  </style>

<body>

<div class="controls">

  <button onclick="generate()">Generate 5 Ideas</button>
  <button id="copy-all-btn" onclick="copyAll()">Copy All</button>

    Click Generate to get your meme ideas

</div>

<footer>NewToWitcher &nbsp;•&nbsp; Meme Idea Generator</footer>

// ─── GENERATE ────────────────────────────────────────────────────────────────

function getAllIdeas() {
  const all = [];
  for (const key in topics) {
    topics[key].forEach(idea => all.push({ ...idea, topic: key }));
  }
  return all;
}

function getIdeasForFilter(filter) {
  if (filter === 'all') return getAllIdeas();
  return (topics[filter] || []).map(idea => ({ ...idea, topic: filter }));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generate() {
  const filter = document.getElementById('topic-filter').value;
  let pool = getIdeasForFilter(filter);

  // If specific topic has fewer than 5, pad with random from all
  if (pool.length < 5) {
    const extras = shuffle(getAllIdeas().filter(i => i.topic !== filter));
    pool = [...shuffle(pool), ...extras];
  } else {
    pool = shuffle(pool);
  }

  const picks = pool.slice(0, 5);
  const container = document.getElementById('results');
  container.innerHTML = '';

  picks.forEach((idea, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.caption = idea.caption;

    card.innerHTML = `
      <div class="card-number">Idea ${i + 1} of 5</div>
      <span class="card-type">${idea.type}</span>
      <button class="copy-btn" onclick="copyCard(this)">Copy</button>
      <h3>${idea.title}</h3>
      <div class="card-caption">${escHtml(idea.caption)}</div>
    `;
    container.appendChild(card);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCard(btn) {
  const card = btn.closest('.card');
  const text = `${card.querySelector('h3').textContent}\n\n${card.dataset.caption}`;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  const cards = document.querySelectorAll('.card');
  if (!cards.length) return;
  const text = [...cards].map((c, i) =>
    `IDEA ${i+1}: ${c.querySelector('h3').textContent}\n\n${c.dataset.caption}`
  ).join('\n\n' + '─'.repeat(40) + '\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-all-btn');
    btn.textContent = 'Copied All!';
    setTimeout(() => { btn.textContent = 'Copy All'; }, 2000);
  });
}

// Generate on load
generate();
</script>
</body>
</html>
